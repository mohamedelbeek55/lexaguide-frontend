<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../css/lawyers-management.css">
</head>

    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">Law Firm</span>

      <nav class="sidebar-nav">
        <a href="../admin-dashboard.html" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Dashboard
        </a>
        <a href="lawyers-management.html" class="nav-link active">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Lawyers
        </a>
        <a href="../users-management.html" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>

        </a>
        <a href="../consultations-management.html" class="nav-link">

            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          Consultations
        </a>
        <a href="../admin-dashboard.html#settings" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          Settings
        </a>
      </nav>
    </aside>
    <div class="main-wrap">
      <main class="main-content">
        <div class="page-header">
          <div>
            <h1>Lawyers Management</h1>
          </div>
          <div class="page-header-actions">
            <a href="../middle-east-law.html" class="btn btn-secondary" id="btnViewMiddleEastLaw">View on Middle East Law Expert</a>
            <button type="button" class="btn btn-primary" id="addBtn">Add Lawyer</button>
          </div>
        </div>

        <div class="toolbar">
          <input type="text" id="search" class="search-input" placeholder="Search by name or specialty..."
            autocomplete="off">
          <select id="filterStatus" class="filter-select" aria-label="Filter by availability">
            <option value="">All</option>
            <option value="online_now">Online now</option>
            <option value="available_in_30_mins">Available in 30 mins</option>
            <option value="unavailable">Unavailable</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Photo</th>
                <th>Full Name</th>
                <th>Specialty</th>
                <th>Country</th>
                <th>Availability</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="modal-overlay" id="modal" aria-hidden="true">
          <div class="modal">
            <div class="modal-header">
              <h2 id="modalTitle">Add Lawyer</h2>
              <button type="button" class="modal-close" id="closeModal" aria-label="Close">&times;</button>
            </div>
            <form id="form" class="modal-form" novalidate>
              <input type="hidden" id="editId" name="editId">
              <input type="hidden" id="modalMode" value="add">
              <div class="form-group" id="fgFullName">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName">
                <span class="error-msg" id="errFullName"></span>
              </div>
              <div class="form-group" id="fgSpecialty">
                <label for="specialty">Specialty (Legal Area) *</label>
                <select id="specialty" name="specialty" required>
                  <option value="">— Select legal area —</option>
                </select>
                <span class="error-msg" id="errSpecialty"></span>
              </div>
              <div class="form-group" id="fgCountry">
                <label for="country">Country</label>
                <input type="text" id="country" name="country">
              </div>
              <div class="form-group" id="fgAvailability">
                <label for="availabilityStatus">Availability *</label>
                <select id="availabilityStatus" name="availabilityStatus">
                  <option value="unavailable">Unavailable</option>
                  <option value="available_in_30_mins">Available in 30 mins</option>
                  <option value="online_now">Online now</option>
                </select>
              </div>
              <div class="form-group" id="fgPrice">
                <label for="pricePerSession">Price per session ($)</label>
                <input type="number" id="pricePerSession" name="pricePerSession" min="0" step="1" placeholder="e.g. 50">
              </div>
              <div class="form-group" id="fgSessionDuration">
                <label for="sessionDurationMins">Session duration (minutes)</label>
                <input type="number" id="sessionDurationMins" name="sessionDurationMins" min="15" step="15" placeholder="e.g. 60">
              </div>
              <div class="form-group" id="fgCommunication">
                <label for="communicationMethods">Communication</label>
                <select id="communicationMethods" name="communicationMethods">
                  <option value="both">Chat & Video</option>
                  <option value="chat">Chat only</option>
                  <option value="video_call">Video call only</option>
                </select>
              </div>
              <div class="form-group" id="fgBio">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3" placeholder="Short professional bio"></textarea>
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../shared/api.js"></script>
  <script src="../js/lawyers-management.js"></script>
</body>

</html>
