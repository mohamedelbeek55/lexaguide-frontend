<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/users-management.css">
</head>

    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">Law Firm</span>

      <nav class="sidebar-nav">
        <a href="admin-dashboard.html" class="nav-link">

            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Dashboard
        </a>
        <a href="lawyers-management.html" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Lawyers
        </a>
        <a href="users-management.html" class="nav-link active">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Users
        </a>
        <a href="consultations-management.html" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          Consultations
        </a>
        <a href="admin-dashboard.html#settings" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          Settings
        </a>
      </nav>
    </aside>
    <div class="main-wrap">
      <header class="topbar">
        <span class="topbar-logo">Users Management</span>
        <div class="topbar-right">
          <div class="topbar-user-menu" id="topbarUserMenu">
            <button type="button" class="topbar-user-trigger" id="topbarUserTrigger" aria-haspopup="true"
              aria-expanded="false" aria-label="Account menu">
              <div class="profile-wrap">
                <div class="profile-avatar" id="profileAvatar">AD</div>
                <span class="profile-name" id="profileName">Admin User</span>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="flex-shrink:0;">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
            <div class="topbar-user-dropdown" role="menu" id="topbarUserDropdown">
              <a href="profile.html" role="menuitem">Profile</a>
              <a href="/index.html#services-section" role="menuitem">Settings</a>
              <button type="button" class="logout" role="menuitem" id="topbarLogout">Log out</button>
            </div>
          </div>
        </div>
      </header>
      <main class="main-content">
        <div class="page-header">
          <h1>Users Management</h1>
          <p class="page-subtitle">Registered users from the website (database)</p>
        </div>

        <div class="stats-bar">
          <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Total Users</div></div>
        </div>

        <div class="toolbar">
          <input type="text" id="search" class="search-input" placeholder="Search by name or email..." autocomplete="off">
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Photo</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Country</th>
                <th>Registered</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <!-- View Details Modal -->
        <div class="modal-overlay" id="viewModal" aria-hidden="true">
          <div class="modal">
            <div class="modal-header">
              <h2>User Details</h2>
              <button type="button" class="modal-close" id="closeViewModal" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body" id="viewModalBody"></div>
          </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal-overlay" id="formModal" aria-hidden="true">
          <div class="modal">
            <div class="modal-header">
              <h2 id="formModalTitle">Add User</h2>
              <button type="button" class="modal-close" id="closeFormModal" aria-label="Close">&times;</button>
            </div>
            <form id="form" class="modal-form" novalidate>
              <input type="hidden" id="editId" name="editId">
              <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName" required>
                <span class="error-msg" id="errFullName"></span>
              </div>
              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
                <span class="error-msg" id="errEmail"></span>
              </div>
              <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="tel" id="phone" name="phone" required>
                <span class="error-msg" id="errPhone"></span>
              </div>
              <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Leave blank to keep when editing">
                <span class="error-msg" id="errPassword"></span>
              </div>
              <div class="form-group">
                <label for="role">Role *</label>
                <select id="role" name="role" required>
                  <option value="User">User</option>
                  <option value="Lawyer">Lawyer</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
              <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                  <option value="Active">Active</option>
                  <option value="Pending">Pending</option>
                  <option value="Banned">Banned</option>
                </select>
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../shared/api.js"></script>
  <script src="../js/users-management.js"></script>
</body>
</html>
